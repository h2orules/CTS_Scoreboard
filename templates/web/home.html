<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css?family=Overpass+Mono" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='css/scoreboard_style_web.css')}}">
</head>

<script>
    var lane_running = {};

    function on_timer() {
        var months = { 0: "January", 1: "February", 2: "March", 3: "April", 4: "May", 5: "June", 6: "July", 7: "August", 8: "September", 9: "October", 10: "November", 11: "December" };

        // Update current time
        var d = new Date();
        var hoursAmPm = (d.getHours() % 12);
        hoursAmPm = (hoursAmPm != 0) ? hoursAmPm : 12;
        document.getElementById("meet_datetime").innerHTML = months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear() + " " + hoursAmPm + ":" + ("0" + d.getMinutes()).slice(-2);
    }

    function init() {
        on_timer();
        window.setInterval(on_timer, 30000);
    }
</script>

<body style="margin:0px" onload="init();">
    <div class="content_outer">
        <div class="content_title_block">
            <div class="content_meet_title">{{ meet_title }}</div>
            <div class="content_meet_date"><span id="meet_datetime"></span></div>
        </div>
        <div class="content_scoreboard" id="scoreboard">
            <div class="content_scoreboard_table">
                <table class="scoreboard_table">
                    <thead>
                        <tr>
                            <th colspan="4" class="scoreboard_title">Event: <span id="current_event"></span> Heat: <span
                                    id="current_heat"></span></th>
                        </tr>

                        <tr>
                            <th colspan="4" class="content_event_name"><span id="event_name" class="anim"></span></th>
                        </tr>

                    </thead>
                    <tbody id="qualifying_times_body">
                    </tbody>
                    <thead>

                        <tr class="scoreboard_header">
                            <th align="center" id="scoreboard_lane_col" style="width:  80px;max-width:  80px;"><span
                                    class="header-full">Lane</span><span class="header-short">Ln</span></th>
                            <th align="center" id="scoreboard_place_col" class="scoreboard_place_col anim"><span
                                    class="header-full">Place</span><span class="header-short">Pl</span></th>
                            <th align="center" id="scoreboard_name_col" class="scoreboard_name_col anim">Name</th>
                            <th align="center" id="scoreboard_time_col" class="scoreboard_time_col anim">Time</th>
                        </tr>
                    </thead>
                    {% for i in range(1, num_lanes + 1) %}
                    <tr class="{{ 'scoreboard_row_odd' if i % 2 == 1 else 'scoreboard_row_eve' }}">
                        <td align="center">{{ i }}</td>
                        <td id="lane_place{{ i }}" align="center"></td>
                        <td id="lane_name{{ i }}" class="lane_name"><div class="lane_name-inner"><span class="lane_swimmer_name" id="lane_swimmer_name{{ i }}">&nbsp;</span><span class="lane_team_code" id="lane_team{{ i }}"></span></div></td>
                        <td align="right"><span id="lane_time{{ i }}"></span>&nbsp;</td>
                    </tr>
                    {% endfor %}
                </table>
            </div>
            <div class="content_scoreboard_ad" id="content_scoreboard_ad">
                {% if ad_url and (ad_url != '') %}
                <img src="{{url_for('static', filename='ad/'+ad_url)}}" width="100%" />
                {% endif %}
            </div>
        </div>
        {% if test_background %}
        <div class="controls">
            <button type="button" onclick="changeEvent(-1);">◀ Event</button>
            <button type="button" onclick="changeEvent(1);">Event ▶</button>
            <button type="button" onclick="changeHeat(-1);">◀ Heat</button>
            <button type="button" onclick="changeHeat(1);">Heat ▶</button>
            <button type="button" onclick="socket.emit('next_heat', {});">Next (Sequential)</button>
        </div>
        {% endif %}
    </div>
    <div class="background" style="background-image: url('{{url_for('static', filename='pool.jpg')}}');"></div>

</body>

<script type="text/javascript" src="{{url_for('static', filename='socket.io.4.8.3.min.js')}}"
    integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0"></script>
<script type="text/javascript" charset="utf-8">
    var s = {}
    var schedule_has_names = {{ 'true' if schedule_has_names else 'false' }};

    // Apply initial name column visibility
    document.querySelectorAll('.scoreboard_name_col, .lane_name').forEach(function (el) {
        el.style.display = schedule_has_names ? 'table-cell' : 'none';
    });

    var socket = io.connect('http://' + document.domain + ':' + location.port + '/scoreboard');
    socket.on('connect', function () {
        {% if test_event %}
        socket.emit('set_event_heat', { event: {{ test_event }}, heat: {{ test_heat or 1 }}});
    {% endif %}
    });

    var currentEvent = {{ test_event or 1 }};
    var currentHeat = {{ test_heat or 1 }};

    function changeEvent(delta) {
        currentEvent = Math.max(1, currentEvent + delta);
        currentHeat = 1;
        socket.emit('set_event_heat', { event: currentEvent, heat: currentHeat });
    }

    function changeHeat(delta) {
        currentHeat = Math.max(1, currentHeat + delta);
        socket.emit('set_event_heat', { event: currentEvent, heat: currentHeat });
    }

    socket.on('update_scoreboard', (new_s) => {
        for (k in new_s) {
            s[k] = new_s[k];
        }

        // Track current event/heat for test controls
        if ("current_event" in s) currentEvent = parseInt(s["current_event"]) || currentEvent;
        if ("current_heat" in s) currentHeat = parseInt(s["current_heat"]) || currentHeat;

        var valid_fields = [
            "content_meet_title",
            "current_event",
            "current_heat",
            "event_name",
            {% for i in range(1, num_lanes + 1) %}
            "lane_place{{ i }}",
        "lane_time{{ i }}",
        {% endfor %}
        ];

    var message_keys = Object.keys(s);

    message_keys.forEach((k) => {
        if (valid_fields.indexOf(k) > 0) {
            document.getElementById(k).innerHTML = s[k];
        }

        // Map lane_name to swimmer name span, lane_team to team code span
        var nameMatch = k.match(/^lane_name(\d+)$/);
        if (nameMatch) {
            var el = document.getElementById("lane_swimmer_name" + nameMatch[1]);
            if (el) el.textContent = (s[k] || '').trimEnd() || '\u00A0';
        }
        var teamMatch = k.match(/^lane_team(\d+)$/);
        if (teamMatch) {
            var el = document.getElementById("lane_team" + teamMatch[1]);
            if (el) el.textContent = (s[k] || '').trimEnd();
        }

        // Check and update lane running
        if (k.startsWith("lane_running")) {
            lane_running[k.replace("lane_running", "")] = s[k];
        }

    })

    // Fill in the running time
    if ("running_time" in s) {
        for (var i = 1; i <= {{ num_lanes }}; i++) {
        if (lane_running[i] || false) {
            document.getElementById("lane_time" + i).innerHTML = s["running_time"];
        }
    }
        }

    // Show/hide name column based on server-cached schedule_has_names flag
    if ("schedule_has_names" in s) {
        schedule_has_names = s["schedule_has_names"];
        document.querySelectorAll('.scoreboard_name_col, .lane_name').forEach(function (el) {
            el.style.display = schedule_has_names ? 'table-cell' : 'none';
        });
    }

    // Render qualifying times rows
    if ("qualifying_times" in s) {
        var qtBody = document.getElementById("qualifying_times_body");
        qtBody.innerHTML = "";
        var qtList = s["qualifying_times"];
        for (var q = 0; q < qtList.length; q++) {
            var qt = qtList[q];
            var tr = document.createElement("tr");
            tr.className = "qualifying_time_row";
            var td = document.createElement("td");
            td.setAttribute("colspan", "4");
            var parts = [qt.time, qt.tag];
            if (qt.description && qt.description !== qt.tag) parts.push(qt.description);
            if (qt.qualifiers) parts.push(qt.qualifiers);
            td.textContent = parts.join("  ");
            tr.appendChild(td);
            qtBody.appendChild(tr);
        }
    }

    s = {};
    });

</script>

</html>
