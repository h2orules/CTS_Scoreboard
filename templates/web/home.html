<html>
<link href="https://fonts.googleapis.com/css?family=Overpass+Mono" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="{{url_for('static', filename='css/scoreboard_style_web.css')}}">
<style>
    .content_title_block {
        width: 800px;
    }

    .content_scoreboard {
        top: 25;
    }
</style>


<script>
    var lane_running = {};

    function on_timer() {
        var months = { 0: "January", 1: "February", 2: "March", 3: "April", 4: "May", 5: "June", 6: "July", 7: "August", 8: "September", 9: "October", 10: "November", 11: "December" };

        // Update current time
        var d = new Date();
        var hoursAmPm = (d.getHours() % 12);
        hoursAmPm = (hoursAmPm != 0) ? hoursAmPm : 12;
        document.getElementById("meet_datetime").innerHTML = months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear() + " " + hoursAmPm + ":" + ("0" + d.getMinutes()).slice(-2);
    }

    function init() {
        on_timer();
        window.setInterval(on_timer, 30000);
    }
</script>

<body style="margin:0px" onload="init();">
    <div class="content_outer">
        <div class="content_scoreboard" id="scoreboard">
            <div class="content_scoreboard_table">
                <table class="scoreboard_table">
                    <thead>
                        <tr>
                            <th colspan="4" class="scoreboard_title">Event: <span id="current_event"></span> Heat: <span
                                    id="current_heat"></span></th>
                        </tr>

                        <tr class="scoreboard_header">
                            <th align="center" id="scoreboard_lane_col" style="width:  80px;max-width:  80px;">Lane</th>
                            <th align="center" id="scoreboard_place_col" class="scoreboard_place_col anim">Place</th>
                            <th align="center" id="scoreboard_time_col" class="scoreboard_time_col anim">Time</th>
                            <th align="center" id="scoreboard_name_col" class="scoreboard_name_col anim">Name</th>
                        </tr>
                    </thead>
                    <tr class="scoreboard_row_odd">
                        <td align="center">1</td>
                        <td id="lane_place1" align="center"></td>
                        <td align="right"><span id="lane_time1"></span>&nbsp;</td>
                        <td id="lane_name1" class="lane_name">&nbsp;</td>
                    </tr>
                    <tr class="scoreboard_row_eve">
                        <td align="center">2</td>
                        <td id="lane_place2" align="center"></td>
                        <td align="right"><span id="lane_time2"></span>&nbsp;</td>
                        <td id="lane_name2" class="lane_name">&nbsp;</td>
                    </tr>
                    <tr class="scoreboard_row_odd">
                        <td align="center">3</td>
                        <td id="lane_place3" align="center"></td>
                        <td align="right"><span id="lane_time3"></span>&nbsp;</td>
                        <td id="lane_name3" class="lane_name">&nbsp;</td>
                    </tr>
                    <tr class="scoreboard_row_eve">
                        <td align="center">4</td>
                        <td id="lane_place4" align="center"></td>
                        <td align="right"><span id="lane_time4"></span>&nbsp;</td>
                        <td id="lane_name4" class="lane_name">&nbsp;</td>
                    </tr>
                    <tr class="scoreboard_row_odd">
                        <td align="center">5</td>
                        <td id="lane_place5" align="center"></td>
                        <td align="right"><span id="lane_time5"></span>&nbsp;</td>
                        <td id="lane_name5" class="lane_name">&nbsp;</td>
                    </tr>
                    <tr class="scoreboard_row_eve">
                        <td align="center">6</td>
                        <td id="lane_place6" align="center"></td>
                        <td align="right"><span id="lane_time6"></span>&nbsp;</td>
                        <td id="lane_name6" class="lane_name">&nbsp;</td>
                    </tr>
                    <tr class="scoreboard_row_odd">
                        <td align="center">7</td>
                        <td id="lane_place7" align="center"></td>
                        <td align="right"><span id="lane_time7"></span>&nbsp;</td>
                        <td id="lane_name7" class="lane_name">&nbsp;</td>
                    </tr>
                    <tr class="scoreboard_row_eve">
                        <td align="center">8</td>
                        <td id="lane_place8" align="center"></td>
                        <td align="right"><span id="lane_time8"></span>&nbsp;</td>
                        <td id="lane_name8" class="lane_name">&nbsp;</td>
                    </tr>
                </table>
            </div>
            <div class="content_scoreboard_ad" id="content_scoreboard_ad">
                {% if ad_url and (ad_url != '') %}
                <img src="{{url_for('static', filename='ad/'+ad_url)}}" width="100%" />
                {% endif %}
            </div>
        </div>
        <div class="content_title_block">
            <div class="content_meet_title">{{ meet_title }}</div>
            <div class="content_event_name"><span id="event_name" class="anim"></span></div>
            <div class="content_meet_date"><span id="meet_datetime"></span></div>
        </div>
        {% if test_background %}
        <div class="controls">
            <button type="button" onclick="socket.emit('next_heat', {});">Next Heat</button>
        </div>
        {% endif %}
    </div>
    <div class="background">
        <img src="{{url_for('static', filename='IMG_2481.PNG')}}" width="100%" />
    </div>

</body>

<script type="text/javascript" src="//cdnjs.cloudflare.com/ajax/libs/socket.io/1.3.6/socket.io.min.js"></script>
<script type="text/javascript" charset="utf-8">
    var s = {}

    var socket = io.connect('http://' + document.domain + ':' + location.port + '/scoreboard');
    socket.on('connect', function () { });

    socket.on('update_scoreboard', (new_s) => {
        for (k in new_s) {
            s[k] = new_s[k];
        }

        var valid_fields = [
            "content_meet_title",
            "current_event",
            "current_heat",
            "event_name",
            "lane_place1",
            "lane_place2",
            "lane_place3",
            "lane_place4",
            "lane_place5",
            "lane_place6",
            "lane_place7",
            "lane_place8",
            "lane_time1",
            "lane_time2",
            "lane_time3",
            "lane_time4",
            "lane_time5",
            "lane_time6",
            "lane_time7",
            "lane_time8",
            "lane_name1",
            "lane_name2",
            "lane_name3",
            "lane_name4",
            "lane_name5",
            "lane_name6",
            "lane_name7",
            "lane_name8",
        ];

        var message_keys = Object.keys(s);

        message_keys.forEach((k) => {
            if (valid_fields.indexOf(k) > 0) {
                document.getElementById(k).innerHTML = s[k];
            }

            // Check and update lane running
            if (k.startsWith("lane_running")) {
                lane_running[k.replace("lane_running", "")] = s[k];
            }

        })

        // Fill in the running time
        if ("running_time" in s) {
            for (var i = 1; i <= 8; i++) {
                if (lane_running[i] || false) {
                    document.getElementById("lane_time" + i).innerHTML = s["running_time"];
                }
            }
        }

        s = {};
    });

</script>

</html>
