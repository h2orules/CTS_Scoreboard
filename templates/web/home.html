<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css?family=Overpass+Mono" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='css/scoreboard_style_web.css')}}">
</head>

<script>
    var lane_running = {};

    function on_timer() {
        var months = { 0: "January", 1: "February", 2: "March", 3: "April", 4: "May", 5: "June", 6: "July", 7: "August", 8: "September", 9: "October", 10: "November", 11: "December" };

        // Update current time
        var d = new Date();
        var hoursAmPm = (d.getHours() % 12);
        hoursAmPm = (hoursAmPm != 0) ? hoursAmPm : 12;
        document.getElementById("meet_datetime").innerHTML = months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear() + " " + hoursAmPm + ":" + ("0" + d.getMinutes()).slice(-2);
    }

    function init() {
        on_timer();
        window.setInterval(on_timer, 30000);
    }
</script>

<body style="margin:0px" onload="init();">
    <div class="content_outer">
        <div class="content_title_block">
            <div class="content_meet_title">{{ meet_title }}</div>
            <div class="content_meet_date"><span id="meet_datetime"></span></div>
        </div>
        <div class="content_scoreboard" id="scoreboard">
            <div class="content_scoreboard_table">
                <table class="scoreboard_table">
                    <thead>
                        <tr>
                            <th colspan="4" class="scoreboard_title">Event: <span id="current_event"></span> Heat: <span
                                    id="current_heat"></span></th>
                        </tr>

                        <tr>
                            <th colspan="4" class="content_event_name"><span id="event_name" class="anim"></span></th>
                        </tr>

                    </thead>
                    <tbody id="qualifying_times_body">
                    </tbody>
                    <thead>

                        <tr class="scoreboard_header">
                            <th align="center" id="scoreboard_lane_col" style="width:  80px;max-width:  80px;"><span
                                    class="header-full">Lane</span><span class="header-short">Ln</span></th>
                            <th align="center" id="scoreboard_place_col" class="scoreboard_place_col anim"><span
                                    class="header-full">Place</span><span class="header-short">Pl</span></th>
                            <th align="center" id="scoreboard_name_col" class="scoreboard_name_col anim">Name</th>
                            <th align="center" id="scoreboard_time_col" class="scoreboard_time_col anim">Time</th>
                        </tr>
                    </thead>
                    {% for i in range(1, num_lanes + 1) %}
                    <tr class="{{ 'scoreboard_row_odd' if i % 2 == 1 else 'scoreboard_row_eve' }}">
                        <td align="center">{{ i }}</td>
                        <td id="lane_place{{ i }}" align="center"></td>
                        <td id="lane_name{{ i }}" class="lane_name"><div class="lane_name-inner"><span class="lane_swimmer_name" id="lane_swimmer_name{{ i }}">&nbsp;</span><span class="lane_age_code" id="lane_age_code{{ i }}"></span><span class="lane_team_code" id="lane_team{{ i }}"></span></div></td>
                        <td align="right"><span id="lane_time{{ i }}"></span><span class="lane_qt_tag" id="lane_qt_tag{{ i }}"></span>&nbsp;</td>
                    </tr>
                    {% endfor %}
                </table>
            </div>
            <div class="content_scoreboard_ad" id="content_scoreboard_ad">
                {% if ad_url and (ad_url != '') %}
                <img src="{{url_for('static', filename='ad/'+ad_url)}}" width="100%" />
                {% endif %}
            </div>
        </div>
        {% if test_background %}
        <div class="controls">
            <button type="button" onclick="changeEvent(-1);">◀ Event</button>
            <button type="button" onclick="changeEvent(1);">Event ▶</button>
            <button type="button" onclick="changeHeat(-1);">◀ Heat</button>
            <button type="button" onclick="changeHeat(1);">Heat ▶</button>
            <button type="button" onclick="socket.emit('next_heat', {});">Next (Sequential)</button>
        </div>
        {% endif %}
    </div>
    <div class="scoreboard_disclaimer">Scoreboard is unofficial. See results for official times.</div>
    <div class="background" style="background-image: url('{{url_for('static', filename='pool.jpg')}}');"></div>

</body>

<script type="text/javascript" src="{{url_for('static', filename='socket.io.4.8.3.min.js')}}"
    integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0"></script>
<script type="text/javascript" charset="utf-8">
    var s = {}
    var schedule_has_names = {{ 'true' if schedule_has_names else 'false' }};
    var qtThresholds = [];  // Current event's qualifying time thresholds
    var laneAgeCodes = {};  // lane -> age_code string (e.g. "8B", "12G")
    var laneTimes = {};    // lane -> display time string from last update
    var laneSeedTimes = {}; // lane -> seed time in seconds (number or "")
    var showPrTags = true;  // Whether to show PR tags
    var maxQtTagLen = 0;    // Longest tag string for space reservation
    var prevEventHeat = ""; // Track event/heat changes for reset

    // Apply initial name column visibility
    document.querySelectorAll('.scoreboard_name_col, .lane_name').forEach(function (el) {
        el.style.display = schedule_has_names ? 'table-cell' : 'none';
    });

    // Parse a display time string like "  1:23.45" or "   23.45" into seconds
    function parseTimeToSeconds(timeStr) {
        if (!timeStr) return null;
        var t = timeStr.replace(/\s/g, '');
        if (!t || t === '') return null;
        var parts = t.split(':');
        var minutes = 0, secMs;
        if (parts.length === 2) {
            minutes = parseInt(parts[0]) || 0;
            secMs = parseFloat(parts[1]);
        } else {
            secMs = parseFloat(parts[0]);
        }
        if (isNaN(secMs)) return null;
        return minutes * 60 + secMs;
    }

    // Get applicable QT thresholds for a given lane based on its age code
    function getThresholdsForLane(lane) {
        if (qtThresholds.length === 0) return [];
        var ageCode = laneAgeCodes[lane] || "";
        var laneAge = null, laneSexCode = null;
        if (ageCode) {
            var m = ageCode.match(/^(\d+)([BGMW])$/);
            if (m) {
                laneAge = parseInt(m[1]);
                var letterMap = {'B': 1, 'M': 1, 'G': 2, 'W': 2};
                laneSexCode = letterMap[m[2]];
            }
        }
        var applicable = [];
        for (var i = 0; i < qtThresholds.length; i++) {
            var qt = qtThresholds[i];
            // If no age code info, all thresholds apply
            if (laneAge === null || laneSexCode === null) {
                applicable.push(qt);
                continue;
            }
            // Check sex match
            if (qt.sex_code !== laneSexCode) continue;
            // Check age overlap
            var qMin = qt.age_min || 0;
            var qMax = qt.age_max || 999;
            if (laneAge < qMin || laneAge > qMax) continue;
            applicable.push(qt);
        }
        return applicable;
    }

    // Evaluate a lane's time against its applicable thresholds
    function evaluateLaneTime(lane, timeText, isRunning) {
        var timeEl = document.getElementById("lane_time" + lane);
        if (!timeEl) return;

        // Reset to default
        timeEl.className = timeEl.className.replace(/\bqt-color-\d+\b/g, '').trim();
        timeEl.classList.remove('qt-pr');
        var tagEl = document.getElementById("lane_qt_tag" + lane);
        if (tagEl) tagEl.textContent = "";

        if (isRunning) return;

        var seconds = parseTimeToSeconds(timeText);
        if (seconds === null || seconds <= 0) return;

        // Check qualifying time standards
        var bestMatch = null;
        if (qtThresholds.length > 0) {
            var thresholds = getThresholdsForLane(lane);
            for (var i = 0; i < thresholds.length; i++) {
                var qt = thresholds[i];
                if (seconds <= qt.time_seconds) {
                    if (bestMatch === null || qt.time_seconds < bestMatch.time_seconds) {
                        bestMatch = qt;
                    }
                }
            }
        }
        if (bestMatch) {
            timeEl.classList.add(bestMatch.color_class);
            if (tagEl) tagEl.textContent = bestMatch.tag;
        } else if (showPrTags) {
            // No qualifying standard met — check for personal record
            var seed = laneSeedTimes[lane];
            if (typeof seed === 'number' && seed > 0 && seconds < seed) {
                timeEl.classList.add('qt-pr');
                if (tagEl) tagEl.textContent = "PR";
            }
        }
    }

    // Render qualifying times rows and update thresholds
    function renderQualifyingTimes(qtList) {
        qtThresholds = qtList;
        var qtBody = document.getElementById("qualifying_times_body");
        qtBody.innerHTML = "";

        // Compute max tag length for space reservation in time cells
        maxQtTagLen = 0;
        for (var q = 0; q < qtList.length; q++) {
            maxQtTagLen = Math.max(maxQtTagLen, qtList[q].tag.length);
        }
        // Update tag placeholder widths
        for (var i = 1; i <= {{ num_lanes }}; i++) {
            var tagEl = document.getElementById("lane_qt_tag" + i);
            if (tagEl) {
                tagEl.style.display = maxQtTagLen > 0 ? "inline-block" : "none";
                tagEl.style.minWidth = maxQtTagLen > 0 ? maxQtTagLen + "ch" : "0";
            }
        }
        
        // Compute max widths for alignment
        var maxTimeLen = 0, maxTagDispLen = 0, maxDescLen = 0;
        for (var q = 0; q < qtList.length; q++) {
            maxTimeLen = Math.max(maxTimeLen, qtList[q].time.length);
            maxTagDispLen = Math.max(maxTagDispLen, qtList[q].tag.length);
            var desc = (qtList[q].description && qtList[q].description !== qtList[q].tag) ? qtList[q].description : "";
            maxDescLen = Math.max(maxDescLen, desc.length);
        }

        for (var q = 0; q < qtList.length; q++) {
            var qt = qtList[q];
            var tr = document.createElement("tr");
            tr.className = "qualifying_time_row";
            var td = document.createElement("td");
            td.setAttribute("colspan", "4");

            var timeSpan = document.createElement("span");
            timeSpan.className = "qt_time";
            timeSpan.textContent = qt.time;
            timeSpan.style.minWidth = maxTimeLen + "ch";
            timeSpan.classList.add(qt.color_class);
            td.appendChild(timeSpan);

            var tagSpan = document.createElement("span");
            tagSpan.className = "qt_tag";
            tagSpan.textContent = qt.tag;
            tagSpan.style.minWidth = maxTagDispLen + "ch";
            tagSpan.classList.add(qt.color_class);
            td.appendChild(tagSpan);

            var desc = (qt.description && qt.description !== qt.tag) ? qt.description : "";
            if (maxDescLen > 0) {
                var descSpan = document.createElement("span");
                descSpan.className = "qt_desc";
                descSpan.textContent = desc;
                descSpan.style.minWidth = maxDescLen + "ch";
                descSpan.classList.add(qt.color_class);
                td.appendChild(descSpan);
            }

            if (qt.qualifiers) {
                var qualSpan = document.createElement("span");
                qualSpan.className = "qt_qualifiers";
                qualSpan.textContent = qt.qualifiers;
                qualSpan.classList.add(qt.color_class);
                td.appendChild(qualSpan);
            }

            tr.appendChild(td);
            qtBody.appendChild(tr);
        }
    }

    // Reset all lane time colors and tags
    function resetLaneQualifications() {
        for (var i = 1; i <= {{ num_lanes }}; i++) {
            var timeEl = document.getElementById("lane_time" + i);
            if (timeEl) {
                timeEl.className = timeEl.className.replace(/\bqt-color-\d+\b/g, '').trim();
                timeEl.classList.remove('qt-pr');
            }
            var tagEl = document.getElementById("lane_qt_tag" + i);
            if (tagEl) tagEl.textContent = "";
        }
    }

    var socket = io.connect('http://' + document.domain + ':' + location.port + '/scoreboard');
    socket.on('connect', function () {
        {% if test_event %}
        socket.emit('set_event_heat', { event: {{ test_event }}, heat: {{ test_heat or 1 }}});
    {% endif %}
    });

    var currentEvent = {{ test_event or 1 }};
    var currentHeat = {{ test_heat or 1 }};

    function changeEvent(delta) {
        currentEvent = Math.max(1, currentEvent + delta);
        currentHeat = 1;
        socket.emit('set_event_heat', { event: currentEvent, heat: currentHeat });
    }

    function changeHeat(delta) {
        currentHeat = Math.max(1, currentHeat + delta);
        socket.emit('set_event_heat', { event: currentEvent, heat: currentHeat });
    }

    socket.on('update_scoreboard', (new_s) => {
        for (k in new_s) {
            s[k] = new_s[k];
        }

        // Detect event/heat change and reset qualifications
        var eventHeatChanged = false;
        if ("current_event" in s || "current_heat" in s) {
            var newEventHeat = (s["current_event"] || currentEvent) + "/" + (s["current_heat"] || currentHeat);
            if (newEventHeat !== prevEventHeat) {
                prevEventHeat = newEventHeat;
                resetLaneQualifications();
                if (s["qualifying_times"]) {
                    renderQualifyingTimes(s["qualifying_times"]);
                }
                laneTimes = {};
                eventHeatChanged = true;
            }
        }

        // Track current event/heat for test controls
        if ("current_event" in s) currentEvent = parseInt(s["current_event"]) || currentEvent;
        if ("current_heat" in s) currentHeat = parseInt(s["current_heat"]) || currentHeat;

        var valid_fields = [
            "content_meet_title",
            "current_event",
            "current_heat",
            "event_name",
            {% for i in range(1, num_lanes + 1) %}
            "lane_place{{ i }}",
        "lane_time{{ i }}",
        {% endfor %}
        ];

        var message_keys = Object.keys(s);

        message_keys.forEach((k) => {
            if (valid_fields.indexOf(k) > 0) {
                document.getElementById(k).innerHTML = s[k];
            }

            // Map lane_name to swimmer name span, lane_team to team code span
            var nameMatch = k.match(/^lane_name(\d+)$/);
            if (nameMatch) {
                var el = document.getElementById("lane_swimmer_name" + nameMatch[1]);
                if (el) el.textContent = (s[k] || '').trimEnd() || '\u00A0';
            }
            var teamMatch = k.match(/^lane_team(\d+)$/);
            if (teamMatch) {
                var el = document.getElementById("lane_team" + teamMatch[1]);
                if (el) el.textContent = (s[k] || '').trimEnd();
            }
            var ageCodeMatch = k.match(/^lane_age_code(\d+)$/);
            if (ageCodeMatch) {
                var laneNum = ageCodeMatch[1];
                var el = document.getElementById("lane_age_code" + laneNum);
                if (el) el.textContent = (s[k] || '').trimEnd();
                laneAgeCodes[laneNum] = (s[k] || '').trim();
            }
            var laneTimeMatch = k.match(/^lane_time(\d+)$/);
            if (laneTimeMatch) {
                laneTimes[laneTimeMatch[1]] = s[k] || "";
            }
            var seedMatch = k.match(/^lane_seed_time(\d+)$/);
            if (seedMatch) {
                laneSeedTimes[seedMatch[1]] = s[k];
            }

            // Check and update lane running
            if (k.startsWith("lane_running")) {
                lane_running[k.replace("lane_running", "")] = s[k];
            }

        })

        // Fill in the running time
        if ("running_time" in s) {
            for (var i = 1; i <= {{ num_lanes }}; i++) {
                if (lane_running[i] || false) {
                    document.getElementById("lane_time" + i).innerHTML = s["running_time"];
                }
            }
        }

        // Show/hide name column based on server-cached schedule_has_names flag
        if ("schedule_has_names" in s) {
            schedule_has_names = s["schedule_has_names"];
            document.querySelectorAll('.scoreboard_name_col, .lane_name').forEach(function (el) {
                el.style.display = schedule_has_names ? 'table-cell' : 'none';
            });
        }

        if ("show_pr_tags" in s) {
            showPrTags = s["show_pr_tags"];
        }

        // Evaluate all lanes for time standard qualifications (skip if event/heat just changed with stale times)
        if (!eventHeatChanged) {
            for (var i = 1; i <= {{ num_lanes }}; i++) {
                evaluateLaneTime(i, laneTimes[i] || "", lane_running[i] || false);
            }
        }

        s = {};
    });

</script>

</html>
