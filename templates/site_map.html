<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Swimming Scoreboard</title>

    <link rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
        integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
        crossorigin="anonymous">
    <link rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css"
        integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp"
        crossorigin="anonymous">
</head>
<style>
    body { background: #fafafa; }

    /* ── Page header (matches settings.html) ───── */
    .page-header-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0 12px;
        margin-bottom: 8px;
        border-bottom: 1px solid #e5e5e5;
    }
    .page-header-bar .page-titles {
        display: flex;
        align-items: baseline;
        gap: 10px;
    }
    .page-header-bar h1 {
        font-size: 22px;
        font-weight: 600;
        margin: 0;
        color: #333;
    }
    .page-header-bar h2 {
        font-size: 16px;
        font-weight: 400;
        margin: 0;
        color: #888;
    }

    /* ── Sections ──────────────────────────────── */
    .map-section { margin-bottom: 28px; }
    .map-section > h3 {
        margin-top: 24px;
        margin-bottom: 12px;
        padding-bottom: 6px;
        border-bottom: 1px solid #eee;
        font-size: 16px;
        font-weight: 600;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }

    /* ── Card grid of links ────────────────────── */
    .map-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 10px;
    }
    .map-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 16px;
        background: #fff;
        border: 1px solid #e1e1e1;
        border-radius: 6px;
        color: #333;
        font-size: 15px;
        font-weight: 500;
        text-decoration: none;
        transition: background 0.12s, border-color 0.12s, transform 0.05s;
    }
    .map-card:hover,
    .map-card:focus {
        background: #f5faff;
        border-color: #b6d4f0;
        color: #1f5fa8;
        text-decoration: none;
    }
    .map-card:active { transform: translateY(1px); }
    .map-card .arrow {
        color: #aaa;
        font-size: 18px;
        line-height: 1;
    }
    .map-card:hover .arrow { color: #1f5fa8; }
</style>

<body>
    <div class="container">
        <div class="page-header-bar">
            <div class="page-titles">
                <h1>Swimming Scoreboard</h1>
                <h2>Site Map</h2>
            </div>
        </div>

        {% for section_title, items in sections %}
            <div class="map-section">
                <h3>{{ section_title }}</h3>
                <div class="map-grid">
                    {% for url, route in items %}
                        <a class="map-card" href="{{ url }}">
                            <span>{{ route }}</span>
                            <span class="arrow">&rsaquo;</span>
                        </a>
                    {% endfor %}
                </div>
            </div>
        {% endfor %}
    </div>
</body>
</html>
