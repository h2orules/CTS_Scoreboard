<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a3d62"/>
      <stop offset="1" stop-color="#0a2a44"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="1" stop-color="#05080c"/>
    </linearGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6e6e6"/>
      <stop offset="1" stop-color="#9aa6b2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Same scoreboard backdrop as the kiosk icon, for a coherent set -->
  <rect x="0" y="0" width="256" height="256" rx="40" ry="40" fill="url(#water)"/>
  <g stroke="#1d5b8c" stroke-width="2" opacity="0.55">
    <line x1="0" y1="60"  x2="256" y2="60"/>
    <line x1="0" y1="100" x2="256" y2="100"/>
    <line x1="0" y1="156" x2="256" y2="156"/>
    <line x1="0" y1="196" x2="256" y2="196"/>
  </g>

  <rect x="28" y="46" width="200" height="164" rx="16" ry="16" fill="url(#bezel)" stroke="#000" stroke-width="2"/>
  <rect x="40" y="58" width="176" height="140" rx="8" ry="8" fill="url(#screen)"/>

  <!-- A single dim amber result row hints at "scoreboard" without competing
       with the gear -->
  <g font-family="'Courier New', monospace" font-weight="700" font-size="18" fill="#ffb000" opacity="0.35" filter="url(#glow)">
    <text x="56"  y="84">1</text>
    <text x="92"  y="84">4</text>
    <text x="208" y="84" text-anchor="end">22.18</text>
  </g>
  <line x1="48" y1="92" x2="208" y2="92" stroke="#1f2a35" stroke-width="1"/>

  <!-- Centered gear glyph -->
  <g transform="translate(128 150)">
    <!-- 12-tooth gear built from a rotated rectangle pattern + base disc -->
    <g fill="url(#gear)" stroke="#1c2530" stroke-width="2" stroke-linejoin="round">
      <g>
        <rect x="-10" y="-58" width="20" height="22" rx="3"/>
        <rect x="-10" y="-58" width="20" height="22" rx="3" transform="rotate(30)"/>
        <rect x="-10" y="-58" width="20" height="22" rx="3" transform="rotate(60)"/>
        <rect x="-10" y="-58" width="20" height="22" rx="3" transform="rotate(90)"/>
        <rect x="-10" y="-58" width="20" height="22" rx="3" transform="rotate(120)"/>
        <rect x="-10" y="-58" width="20" height="22" rx="3" transform="rotate(150)"/>
      </g>
      <circle cx="0" cy="0" r="44"/>
    </g>
    <!-- Inner hub + hole -->
    <circle cx="0" cy="0" r="28" fill="#1c2530" stroke="#000" stroke-width="2"/>
    <circle cx="0" cy="0" r="14" fill="url(#water)" stroke="#000" stroke-width="2"/>
  </g>
</svg>
