<?xml version="1.0" encoding="UTF-8"?>
<!-- Swimming Scoreboard favicon: flat stopwatch on a deep-pool tile.
     Designed to read at 16x16: bold silhouette, single bright accent,
     no fine detail that would blur at small sizes. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Pool tile background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="#0a3d62"/>

  <!-- Stopwatch body -->
  <g transform="translate(32 36)">
    <!-- Crown (top knob) -->
    <rect x="-5" y="-26" width="10" height="5" rx="1.5" fill="#e6edf3"/>
    <!-- Side buttons -->
    <rect x="-17" y="-22" width="6" height="4" rx="1.2" fill="#e6edf3"
          transform="rotate(-30 -14 -20)"/>
    <rect x="11"  y="-22" width="6" height="4" rx="1.2" fill="#e6edf3"
          transform="rotate(30 14 -20)"/>

    <!-- Outer case -->
    <circle cx="0" cy="0" r="22" fill="#e6edf3"/>
    <!-- Inner bezel ring -->
    <circle cx="0" cy="0" r="19" fill="none" stroke="#0a3d62" stroke-width="1.2"/>

    <!-- Hour marks (12, 3, 6, 9) -->
    <g fill="#0a3d62">
      <rect x="-1.2" y="-18" width="2.4" height="4" rx="1"/>
      <rect x="14"   y="-1.2" width="4" height="2.4" rx="1"/>
      <rect x="-1.2" y="14"  width="2.4" height="4" rx="1"/>
      <rect x="-18"  y="-1.2" width="4" height="2.4" rx="1"/>
    </g>

    <!-- Bright teal progress arc sweeping from 12 to ~4 o'clock -->
    <path d="M 0 -16 A 16 16 0 0 1 13.86 8"
          fill="none" stroke="#0fa3a3" stroke-width="4"
          stroke-linecap="round"/>

    <!-- Hands -->
    <!-- minute hand pointing up-right -->
    <line x1="0" y1="0" x2="9" y2="-12"
          stroke="#0a3d62" stroke-width="2.4" stroke-linecap="round"/>
    <!-- second/big hand pointing to the progress endpoint -->
    <line x1="0" y1="0" x2="13.86" y2="8"
          stroke="#0fa3a3" stroke-width="2.4" stroke-linecap="round"/>

    <!-- Center pin -->
    <circle cx="0" cy="0" r="2.4" fill="#0a3d62"/>
    <circle cx="0" cy="0" r="0.9" fill="#ffffff"/>
  </g>
</svg>
