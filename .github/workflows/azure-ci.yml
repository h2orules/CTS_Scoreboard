name: azure-ci

# CI for the Azure relay app: lint, type-check, unit tests, container build.
# No deployment. Runs on PRs and pushes to master.

on:
  pull_request:
    paths:
      - 'azure/**'
      - '.github/workflows/azure-ci.yml'
  push:
    branches: [master]
    paths:
      - 'azure/**'
      - '.github/workflows/azure-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azure
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app tests

      - name: Mypy type-check
        run: mypy app
        continue-on-error: true   # strict mypy; downgraded to warning until app grows beyond scaffold

      - name: Pytest unit
        run: pytest tests/unit -v --cov=app --cov-report=term-missing

      - name: Pytest integration (fakeredis, in-process)
        run: pytest tests/integration -v

  container-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./azure
          push: false
          tags: cts-relay:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
