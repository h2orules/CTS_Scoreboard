name: stress-run

# Starts a single execution of the stress-test job pool. Inputs control
# the target URL, total browser count, per-replica fanout, hold/delay timing,
# cache mode, and total run duration. In `multi` mode the load is split
# 50/50 across westus and eastus2.
#
# Each execution is independent. Run this workflow as many times as you
# want simultaneous waves; use `stress-stop.yml` to cancel running waves.

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Full URL of the live meet page to load (e.g. https://cts-sb-prod-app.<region>.azurecontainerapps.io/web/home?meet=ABC)'
        required: true
        type: string
      total_browsers:
        description: 'Total number of concurrent browsers across all replicas/regions'
        required: true
        type: number
        default: 400
      browsers_per_replica:
        description: 'Browsers run per job replica. replicas = ceil(total_browsers / browsers_per_replica)'
        required: true
        type: number
        default: 10
      min_hold_seconds:
        description: 'Minimum seconds a browser stays connected to the meet page'
        required: true
        type: number
        default: 30
      max_hold_seconds:
        description: 'Maximum seconds a browser stays connected'
        required: true
        type: number
        default: 120
      min_delay_seconds:
        description: 'Minimum seconds between closing one browser and reopening the next'
        required: true
        type: number
        default: 2
      max_delay_seconds:
        description: 'Maximum seconds between cycles'
        required: true
        type: number
        default: 10
      cache_mode:
        description: 'cold = fresh browser per cycle, hot = persistent context, mixed = alternate'
        required: true
        type: choice
        options: [hot, cold, mixed]
        default: mixed
      total_duration_seconds:
        description: 'Total wall-clock duration of the run'
        required: true
        type: number
        default: 600
      mode:
        description: 'single (westus only) or multi (split across westus + eastus2)'
        required: true
        type: choice
        options: [single, multi]
        default: single

permissions:
  id-token: write
  contents: read

jobs:
  start:
    runs-on: ubuntu-latest
    environment: stress    # required-reviewer gate + OIDC federation subject
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate inputs
        run: |
          T=${{ inputs.total_browsers }}
          P=${{ inputs.browsers_per_replica }}
          if (( T < 1 || T > 1000 )); then
            echo "::error::total_browsers must be between 1 and 1000 (got $T)"
            exit 1
          fi
          if (( P < 1 || P > 50 )); then
            echo "::error::browsers_per_replica must be between 1 and 50 (got $P)"
            exit 1
          fi
          if (( ${{ inputs.min_hold_seconds }} > ${{ inputs.max_hold_seconds }} )); then
            echo "::error::min_hold_seconds > max_hold_seconds"; exit 1
          fi
          if (( ${{ inputs.min_delay_seconds }} > ${{ inputs.max_delay_seconds }} )); then
            echo "::error::min_delay_seconds > max_delay_seconds"; exit 1
          fi

      - name: Compute per-region split
        id: split
        run: |
          T=${{ inputs.total_browsers }}
          P=${{ inputs.browsers_per_replica }}
          if [[ "${{ inputs.mode }}" == "multi" ]]; then
            T_W=$(( (T + 1) / 2 ))
            T_E=$(( T - T_W ))
          else
            T_W=$T
            T_E=0
          fi
          R_W=$(( (T_W + P - 1) / P ))
          R_E=$(( T_E == 0 ? 0 : (T_E + P - 1) / P ))
          # Actual browser counts after rounding up to whole replicas.
          A_W=$(( R_W * P ))
          A_E=$(( R_E * P ))
          {
            echo "westus_replicas=$R_W"
            echo "eastus2_replicas=$R_E"
            echo "westus_browsers=$A_W"
            echo "eastus2_browsers=$A_E"
            echo "total_browsers=$(( A_W + A_E ))"
          } >> $GITHUB_OUTPUT

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Start westus execution
        if: steps.split.outputs.westus_replicas != '0'
        id: start_westus
        env:
          R: ${{ steps.split.outputs.westus_replicas }}
          T: ${{ inputs.total_duration_seconds }}
        run: |
          REGION=westus
          RG="cts-scoreboard-stress-${REGION}"
          JOB="cts-sb-stress-${REGION}-job"
          # Prior failed `az containerapp job update` calls have left the
          # live resource with a broken container slot (named after the job
          # and with no Image set). Every subsequent write — including a
          # minimal PATCH that does NOT touch properties.template — fails
          # with ContainerAppImageRequired because ARM validates the whole
          # resource on each write.
          #
          # Heal it in the same PATCH: read the current template, find the
          # first container slot that still has a valid image, and rebuild
          # properties.template.containers as a single clean container
          # named `stress` (matching the Bicep) carrying that image.
          SUB_ID=$(az account show --query id -o tsv)
          URI="https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.App/jobs/${JOB}?api-version=2024-03-01"
          JOB_JSON=$(az rest --method GET --uri "$URI")
          CONTAINER=$(echo "$JOB_JSON" | jq -c '
            .properties.template.containers
            | map(select(.image != null and .image != ""))
            | .[0]
            | . + {name: "stress"}
          ')
          if [[ -z "$CONTAINER" || "$CONTAINER" == "null" ]]; then
            echo "::error::No container with a valid image found on $JOB; cannot heal template"; exit 1
          fi
          BODY=$(jq -nc \
            --argjson R "$R" \
            --argjson T "$T" \
            --argjson C "$CONTAINER" '{
              properties: {
                configuration: {
                  replicaTimeout: $T,
                  manualTriggerConfig: {
                    parallelism: $R,
                    replicaCompletionCount: $R
                  }
                },
                template: {
                  containers: [ $C ]
                }
              }
            }')
          az rest --method PATCH --uri "$URI" --body "$BODY" -o none
          # `az containerapp job start --env-vars` has a CLI bug: when no
          # --image / --container-name is passed, it builds the execution
          # overrideTemplate with a phantom container slot NAMED AFTER THE
          # JOB and with no image, which ARM rejects with
          # ContainerAppImageRequired. Bypass the CLI: POST directly to the
          # job's /start action with a proper executionTemplate that names
          # the container `stress` and carries the current image.
          IMG=$(echo "$CONTAINER" | jq -r '.image')
          START_URI="https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.App/jobs/${JOB}/start?api-version=2024-03-01"
          START_BODY=$(jq -nc \
            --arg img "$IMG" \
            --arg target_url "${{ inputs.target_url }}" \
            --arg browsers_per_replica "${{ inputs.browsers_per_replica }}" \
            --arg min_hold "${{ inputs.min_hold_seconds }}" \
            --arg max_hold "${{ inputs.max_hold_seconds }}" \
            --arg min_delay "${{ inputs.min_delay_seconds }}" \
            --arg max_delay "${{ inputs.max_delay_seconds }}" \
            --arg cache_mode "${{ inputs.cache_mode }}" \
            --arg total_duration "${{ inputs.total_duration_seconds }}" '{
              containers: [
                {
                  name: "stress",
                  image: $img,
                  env: [
                    {name: "TARGET_URL",             value: $target_url},
                    {name: "BROWSERS_PER_REPLICA",   value: $browsers_per_replica},
                    {name: "MIN_HOLD_SECONDS",       value: $min_hold},
                    {name: "MAX_HOLD_SECONDS",       value: $max_hold},
                    {name: "MIN_DELAY_SECONDS",      value: $min_delay},
                    {name: "MAX_DELAY_SECONDS",      value: $max_delay},
                    {name: "CACHE_MODE",             value: $cache_mode},
                    {name: "TOTAL_DURATION_SECONDS", value: $total_duration}
                  ]
                }
              ]
            }')
          OUT=$(az rest --method POST --uri "$START_URI" --body "$START_BODY")
          EXEC=$(echo "$OUT" | jq -r '.name // .id | split("/") | last')
          echo "exec=$EXEC" >> $GITHUB_OUTPUT
          echo "::notice title=westus execution started::$EXEC ($R replicas)"

      - name: Start eastus2 execution
        if: steps.split.outputs.eastus2_replicas != '0'
        id: start_eastus2
        env:
          R: ${{ steps.split.outputs.eastus2_replicas }}
          T: ${{ inputs.total_duration_seconds }}
        run: |
          REGION=eastus2
          RG="cts-scoreboard-stress-${REGION}"
          JOB="cts-sb-stress-${REGION}-job"
          SUB_ID=$(az account show --query id -o tsv)
          URI="https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.App/jobs/${JOB}?api-version=2024-03-01"
          # If the eastus2 job hasn't been deployed yet, skip gracefully
          # rather than failing the whole workflow.
          if ! JOB_JSON=$(az rest --method GET --uri "$URI" 2>/dev/null); then
            echo "::warning title=eastus2 job missing::$JOB not found in $RG; skipping eastus2 step"
            exit 0
          fi
          CONTAINER=$(echo "$JOB_JSON" | jq -c '
            .properties.template.containers
            | map(select(.image != null and .image != ""))
            | .[0]
            | . + {name: "stress"}
          ')
          if [[ -z "$CONTAINER" || "$CONTAINER" == "null" ]]; then
            echo "::error::No container with a valid image found on $JOB; cannot heal template"; exit 1
          fi
          BODY=$(jq -nc \
            --argjson R "$R" \
            --argjson T "$T" \
            --argjson C "$CONTAINER" '{
              properties: {
                configuration: {
                  replicaTimeout: $T,
                  manualTriggerConfig: {
                    parallelism: $R,
                    replicaCompletionCount: $R
                  }
                },
                template: {
                  containers: [ $C ]
                }
              }
            }')
          az rest --method PATCH --uri "$URI" --body "$BODY" -o none
          IMG=$(echo "$CONTAINER" | jq -r '.image')
          START_URI="https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.App/jobs/${JOB}/start?api-version=2024-03-01"
          START_BODY=$(jq -nc \
            --arg img "$IMG" \
            --arg target_url "${{ inputs.target_url }}" \
            --arg browsers_per_replica "${{ inputs.browsers_per_replica }}" \
            --arg min_hold "${{ inputs.min_hold_seconds }}" \
            --arg max_hold "${{ inputs.max_hold_seconds }}" \
            --arg min_delay "${{ inputs.min_delay_seconds }}" \
            --arg max_delay "${{ inputs.max_delay_seconds }}" \
            --arg cache_mode "${{ inputs.cache_mode }}" \
            --arg total_duration "${{ inputs.total_duration_seconds }}" '{
              containers: [
                {
                  name: "stress",
                  image: $img,
                  env: [
                    {name: "TARGET_URL",             value: $target_url},
                    {name: "BROWSERS_PER_REPLICA",   value: $browsers_per_replica},
                    {name: "MIN_HOLD_SECONDS",       value: $min_hold},
                    {name: "MAX_HOLD_SECONDS",       value: $max_hold},
                    {name: "MIN_DELAY_SECONDS",      value: $min_delay},
                    {name: "MAX_DELAY_SECONDS",      value: $max_delay},
                    {name: "CACHE_MODE",             value: $cache_mode},
                    {name: "TOTAL_DURATION_SECONDS", value: $total_duration}
                  ]
                }
              ]
            }')
          OUT=$(az rest --method POST --uri "$START_URI" --body "$START_BODY")
          EXEC=$(echo "$OUT" | jq -r '.name // .id | split("/") | last')
          echo "exec=$EXEC" >> $GITHUB_OUTPUT
          echo "::notice title=eastus2 execution started::$EXEC ($R replicas)"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Stress run kicked off"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Mode | ${{ inputs.mode }} |"
            echo "| Target URL | \`${{ inputs.target_url }}\` |"
            echo "| Total browsers (requested) | ${{ inputs.total_browsers }} |"
            echo "| Total browsers (actual) | ${{ steps.split.outputs.total_browsers }} |"
            echo "| Browsers per replica | ${{ inputs.browsers_per_replica }} |"
            echo "| Hold (s) | ${{ inputs.min_hold_seconds }}-${{ inputs.max_hold_seconds }} |"
            echo "| Delay (s) | ${{ inputs.min_delay_seconds }}-${{ inputs.max_delay_seconds }} |"
            echo "| Cache mode | ${{ inputs.cache_mode }} |"
            echo "| Duration (s) | ${{ inputs.total_duration_seconds }} |"
            echo ""
            echo "### Per-region executions"
            echo "| Region | Replicas | Browsers | Execution |"
            echo "|---|---|---|---|"
            echo "| westus  | ${{ steps.split.outputs.westus_replicas }}  | ${{ steps.split.outputs.westus_browsers }}  | \`${{ steps.start_westus.outputs.exec }}\` |"
            echo "| eastus2 | ${{ steps.split.outputs.eastus2_replicas }} | ${{ steps.split.outputs.eastus2_browsers }} | \`${{ steps.start_eastus2.outputs.exec }}\` |"
            echo ""
            echo "Tail logs with:"
            echo '```'
            echo "az containerapp job execution show -g cts-scoreboard-stress-westus -n cts-sb-stress-westus-job --execution-name <exec>"
            echo '```'
            echo "Cancel with the **stress-stop** workflow."
          } >> $GITHUB_STEP_SUMMARY
